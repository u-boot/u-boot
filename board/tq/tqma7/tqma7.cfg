/* image version */
IMAGE_VERSION 2

#include <config.h>

/*
 * Set to sd even for QSPI boot on i.MX7, as i.MX7 uses offset 0x400 rather
 * than 0x1000 for QSPI
 */
BOOT_FROM      sd

#if IS_ENABLED(CONFIG_IMX_HAB)
CSF CONFIG_CSF_SIZE
#endif
